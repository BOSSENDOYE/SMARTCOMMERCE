# ─── VirtualHost Backend Laravel (API) ────────────────────────────────────────
# Fichier : apache-backend.conf

<VirtualHost *:80>
    ServerName api.baobab.local
    # En production : ServerName api.baobab.sn

    # Pointer sur le dossier public/ de Laravel
    DocumentRoot "e:/CODING/DSTCOMPUTING/Plateforme/SMARTCOMMERCE/SMARTCOMMERCE/backend/public"
    # En production : DocumentRoot "/var/www/baobab/backend/public"

    <Directory "e:/CODING/DSTCOMPUTING/Plateforme/SMARTCOMMERCE/SMARTCOMMERCE/backend/public">
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # CORS pour permettre au frontend d'appeler l'API
    Header always set Access-Control-Allow-Origin "http://baobab.local"
    # En production : Header always set Access-Control-Allow-Origin "https://app.baobab.sn"
    Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
    Header always set Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Store-Id, X-Workstation"
    Header always set Access-Control-Allow-Credentials "true"

    # Répondre OK aux requêtes preflight OPTIONS
    RewriteEngine On
    RewriteCond %{REQUEST_METHOD} OPTIONS
    RewriteRule ^(.*)$ $1 [R=200,L]

    ErrorLog "logs/baobab-api-error.log"
    AccessLog "logs/baobab-api-access.log" combined
</VirtualHost>
