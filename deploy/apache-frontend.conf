# ─── VirtualHost Frontend React (PWA) ────────────────────────────────────────
# Fichier : apache-frontend.conf
# Copier dans : C:\xampp\apache\conf\extra\  ou  /etc/apache2/sites-available/

<VirtualHost *:80>
    ServerName baobab.local
    # En production : ServerName app.baobab.sn

    # Dossier de build React (npm run build → dist/)
    DocumentRoot "e:/CODING/DSTCOMPUTING/Plateforme/SMARTCOMMERCE/SMARTCOMMERCE/frontend/dist"
    # En production : DocumentRoot "/var/www/baobab/frontend/dist"

    <Directory "e:/CODING/DSTCOMPUTING/Plateforme/SMARTCOMMERCE/SMARTCOMMERCE/frontend/dist">
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # SPA : renvoyer index.html pour toutes les routes React Router
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    # Headers de sécurité + PWA
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Cache long pour les assets versionnés (Vite ajoute un hash au nom)
    <FilesMatch "\.(js|css|woff2|png|svg|ico)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </FilesMatch>

    # Ne pas cacher index.html et le service worker
    <FilesMatch "^(index\.html|sw\.js|workbox-.+\.js)$">
        Header set Cache-Control "no-cache, no-store, must-revalidate"
    </FilesMatch>

    ErrorLog "logs/baobab-frontend-error.log"
    AccessLog "logs/baobab-frontend-access.log" combined
</VirtualHost>
