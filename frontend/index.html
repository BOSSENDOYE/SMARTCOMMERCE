    <!--
      Capturer beforeinstallprompt AVANT que React monte.
      Chrome peut déclencher cet événement très tôt — si React n'a pas
      encore monté son useEffect, l'event serait perdu.
    -->
    <script>
      window.__pwaPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__pwaPrompt = e;
        window.dispatchEvent(new CustomEvent('pwa-prompt-ready'));
      });
    </script>
