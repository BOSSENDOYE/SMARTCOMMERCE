<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#863bff"/>

  <!-- Trunk (large and wide — caractéristique du baobab) -->
  <path d="M24 56 L24 35 Q24 31 32 31 Q40 31 40 35 L40 56 Z" fill="white"/>

  <!-- Ground / racines étalées -->
  <ellipse cx="32" cy="57" rx="17" ry="5" fill="white"/>

  <!-- Branche gauche principale -->
  <path d="M27 33 L9 21" stroke="white" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- Sous-branches gauches -->
  <path d="M9 21 L3 12"  stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M9 21 L15 12" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- Branche droite principale -->
  <path d="M37 33 L55 21" stroke="white" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- Sous-branches droites -->
  <path d="M55 21 L61 12" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M55 21 L49 12" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- Branche centre-gauche -->
  <path d="M30 31 L20 13" stroke="white" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M20 13 L15 6"  stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M20 13 L25 6"  stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Branche centre-droite -->
  <path d="M34 31 L44 13" stroke="white" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M44 13 L49 6"  stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M44 13 L39 6"  stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Branche centrale verticale -->
  <path d="M32 31 L32 10" stroke="white" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M32 10 L27 3"  stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M32 10 L37 3"  stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
</svg>
